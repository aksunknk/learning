name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check scripts
        run: |
          node --check app.js
          node --check js/utils.js
          node --check js/runner.js
          node --check js/practice.js
          node --check data/quizzes.js
          node --check data/puzzles.js
          node --check data/exercises.js
          node --check data/fillblanks.js

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Run smoke tests
        env:
          CHROME_PATH: /usr/bin/chromium-browser
        run: |
          if [ ! -x "$CHROME_PATH" ]; then
            export CHROME_PATH=/usr/bin/chromium
          fi
          npm test
