<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Python・React・TypeScriptの基礎から実践まで学べるインタラクティブ学習サイト。生成AIでアプリ開発経験のある初級プログラマー向け。">
  <title>Code Foundations | Python・React・TypeScript 学習ガイド</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HERO SECTION ===== -->
  <header class="hero" id="hero">
    <canvas id="particle-canvas"></canvas>
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="gradient-text">Code Foundations</span>
      </h1>
      <p class="hero-subtitle">
        「なぜそう書くのか」を、手を動かして身につける学習ガイド
      </p>
      <a href="#tab-nav" class="hero-cta">
        学習をはじめる
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 5v14M19 12l-7 7-7-7"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ===== MAIN LEARNING AREA ===== -->
  <main class="main-container" id="learning-area">

    <!-- Progress Overview -->
    <section class="progress-overview">
      <div class="progress-header">
        <h2>学習の進捗</h2>
        <div class="progress-header-actions">
          <button type="button" class="progress-io-btn" id="export-progress-btn" title="進捗をJSONファイルに保存">エクスポート</button>
          <button type="button" class="progress-io-btn" id="import-progress-btn" title="保存した進捗を読み込み">インポート</button>
          <input type="file" id="import-progress-file" accept="application/json,.json" hidden>
          <span class="overall-progress-text" id="overall-progress-text">0% 完了</span>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="overall-progress-bar"></div>
      </div>
      <!-- 統計値は app.js が TABS / quizData / puzzleData から算出 -->
      <div class="catalog-stats" aria-label="学習カタログの規模">
        <div class="stat-item">
          <span class="stat-number" data-stat="topics">—</span>
          <span class="stat-label">トピック</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="lessons">—</span>
          <span class="stat-label">レッスン</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="quizzes">—</span>
          <span class="stat-label">クイズ</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="puzzles">—</span>
          <span class="stat-label">パズル</span>
        </div>
      </div>
      <button type="button" class="disclosure-toggle" id="progress-detail-toggle"
              aria-expanded="false" aria-controls="progress-cards">
        トピック別の詳細を表示
      </button>
      <div class="progress-cards is-collapsed" id="progress-cards" hidden><!-- app.js が生成 --></div>
    </section>

    <!-- Learning Roadmap（推奨学習経路） -->
    <section class="roadmap-section" aria-label="学習ロードマップ">
      <div class="roadmap-header">
        <h2>学習ロードマップ</h2>
        <p>推奨順に進めると、各章の前提が揃った状態で学べます。</p>
      </div>
      <button type="button" class="disclosure-toggle" id="roadmap-detail-toggle"
              aria-expanded="false" aria-controls="roadmap-track">
        推奨経路を表示
      </button>
      <div class="roadmap-track is-collapsed" id="roadmap-track" hidden></div>
      <p class="roadmap-note">Python認定基礎 / Python実践試験 / 生成AIパスポートは、対応章のあと任意で挑戦できます。</p>
    </section>

    <!-- Tab Navigation（カテゴリグループ化） -->
    <nav class="tab-navigation" id="tab-nav">
      <div class="site-search" role="search">
        <input type="search" id="site-search-input" placeholder="🔍 レッスンを検索（例: JWT / JOIN / useEffect）" autocomplete="off" aria-label="レッスン検索">
        <div class="search-results" id="search-results" hidden></div>
      </div>
      <div class="tab-groups" role="tablist" aria-label="学習カテゴリ">
        <button type="button" class="tab-group-btn active" data-group="basics">基礎</button>
        <button type="button" class="tab-group-btn" data-group="backend">バックエンド</button>
        <button type="button" class="tab-group-btn" data-group="frontend">フロントエンド</button>
        <button type="button" class="tab-group-btn" data-group="practice">実践・試験</button>
      </div>
      <div class="tab-list" role="tablist"><!-- app.js が TABS レジストリから生成 --></div>
      <div class="tab-indicator" id="tab-indicator"></div>
    </nav>

    <div id="tab-panels"><!-- app.js が TABS レジストリから生成 --></div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-main">
        <p>&copy; 2026 Code Foundations. Built for learners in the AI era.</p>
      </div>
    </div>
  </footer>

  <script src="data/quizzes.js"></script>
  <script src="data/puzzles.js"></script>
  <script src="data/missions.js"></script>
  <script src="data/crossrefs.js"></script>
  <script src="data/taskboard.js"></script>
  <script src="data/fillblanks.js"></script>
  <script src="data/exercises.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/practice.js"></script>
  <script src="app.js"></script>
</body>
</html>
